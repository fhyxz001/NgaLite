name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.check_release.outputs.release_tag }}
      is_release: ${{ steps.check_release.outputs.is_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check commit message for release
        id: check_release
        shell: bash
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qP '发布v(\d+\.\d+(?:\.\d+)?)'; then
            TAG=v$(echo "$COMMIT_MSG" | grep -oP '发布v\K(\d+\.\d+(?:\.\d+)?)')
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Detected release: $TAG"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "No release pattern found"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NgaLite-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: steps.check_release.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_release.outputs.release_tag }}
          name: ${{ steps.check_release.outputs.release_tag }}
          body: |
            ## ${{ steps.check_release.outputs.release_tag }}

            自动构建发布。
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
